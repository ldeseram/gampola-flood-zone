  #panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: white;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));

    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: 600;
    color: white;
    background: #1565c0;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  #findBtn:active { background: #0d47a1; }
  #findBtn:disabled { background: #90a4ae; }

  #result {
    margin-top: 12px;
    padding: 14px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    display: none;
  }
  .safe   { background: #e8f5e9; color: #1b5e20; }
  .danger { background: #ffebee; color: #b71c1c; }
  .info   { background: #e3f2fd; color: #0d47a1; }

  .legend {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3);
    font-size: 13px;
  }
  .legend span {
    display: inline-block;
    width: 14px;
    height: 14px;
    background: #2196f3;
    opacity: 0.5;
    margin-right: 6px;
    vertical-align: middle;
    border: 1px solid #1565c0;
  }
</style>

// STEP 2 (optional): set the initial map center/zoom.
// If left as-is, the map auto-fits to your flood zone extent.
const initialZoom = 14;

// ---- Map setup ----
const map = L.map('map', { zoomControl: true });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const floodLayer = L.geoJSON(floodZoneGeoJSON, {
  style: {
    color: '#1565c0',
    weight: 2,
    fillColor: '#2196f3',
    fillOpacity: 0.45
  }
}).addTo(map);

if (floodLayer.getBounds().isValid()) {
  map.fitBounds(floodLayer.getBounds(), { padding: [30, 30] });
} else {
  map.setView([7.1642, 80.5674], initialZoom); // fallback: Gampola
}

let userMarker = null;

function checkMyLocation() {
  const btn = document.getElementById('findBtn');
  const result = document.getElementById('result');

  if (!navigator.geolocation) {
    showResult('info', 'Your browser does not support location. Please try a different browser.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '📍 Locating...';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      btn.disabled = false;
      btn.textContent = '📍 Find Out If I\'m In The Flood Zone';

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const pt = turf.point([lng, lat]);

      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([lat, lng]).addTo(map)
        .bindPopup('You are here').openPopup();
      map.setView([lat, lng], 16);

      let inside = false;
      floodZoneGeoJSON.features.forEach(f => {
        if (turf.booleanPointInPolygon(pt, f)) inside = true;
      });

      if (inside) {
        showResult('danger', '⚠️ YOU ARE INSIDE THE FLOOD INUNDATION ZONE. Please follow local evacuation guidance.');
      } else {
        showResult('safe', '✅ You are NOT inside the mapped flood inundation zone.');
      }
    },
    (err) => {
      btn.disabled = false;
      btn.textContent = '📍 Find Out If I\'m In The Flood Zone';
      let msg = 'Could not get your location. ';
      if (err.code === 1) msg += 'Please allow location/GPS permission for this site in your browser settings.';
      else if (err.code === 2) msg += 'Location signal unavailable — try moving outdoors or check your GPS/data connection.';
      else msg += 'Please try again.';
      showResult('info', msg);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function showResult(type, text) {
  const result = document.getElementById('result');
  result.className = type;
  result.style.display = 'block';
  result.textContent = text;
}
