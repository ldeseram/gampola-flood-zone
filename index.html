    font-size: 16px;
    font-weight: 600;
    text-align: center;

  .legend {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    background: white;
    padding: 10px 14px;
    border-radius: 8px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3);
    font-size: 13px;
    line-height: 1.8;
  }

  .legend span.swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 6px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.3);

const initialZoom = 15;

const riskColors = {
  "High": "#e53935",
  "Moderate": "#fb8c00",
  "Low": "#fdd835"
};

// ---- Map setup ----
const map = L.map('map', { zoomControl: true });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const floodLayer = L.geoJSON(floodZoneGeoJSON, {
  style: (feature) => {
    const risk = feature.properties.Risk;
    return {
      color: riskColors[risk] || '#999',
      weight: 2,
      fillColor: riskColors[risk] || '#999',
      fillOpacity: 0.5
    };
  },
  onEachFeature: (feature, layer) => {
    const risk = feature.properties.Risk || 'Unknown';
    layer.bindPopup(`Flood Risk: <b>${risk}</b>`);
  }
}).addTo(map);

if (floodLayer.getBounds().isValid()) {
  map.fitBounds(floodLayer.getBounds(), { padding: [30, 30] });
} else {
  map.setView([6.9271, 79.8612], initialZoom); // fallback: Colombo
}

let userMarker = null;

function checkMyLocation() {
  const btn = document.getElementById('findBtn');

  if (!navigator.geolocation) {
    showResult('info', 'Your browser does not support location. Please try a different browser.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '📍 Locating...';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      btn.disabled = false;
      btn.textContent = '📍 Find Out My Flood Risk';

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const pt = turf.point([lng, lat]);

      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([lat, lng]).addTo(map)
        .bindPopup('You are here').openPopup();
      map.setView([lat, lng], 17);

      let foundRisk = null;
      floodZoneGeoJSON.features.forEach(f => {
        if (turf.booleanPointInPolygon(pt, f)) {
          foundRisk = f.properties.Risk;
        }
      });

      if (foundRisk === 'High') {
        showResult('risk-high', '⚠️ HIGH FLOOD RISK. You are in a high-risk zone — please follow local evacuation guidance.');
      } else if (foundRisk === 'Moderate') {
        showResult('risk-mod', '⚠️ MODERATE FLOOD RISK. Stay alert and monitor local updates.');
      } else if (foundRisk === 'Low') {
        showResult('risk-low', '⚠️ LOW FLOOD RISK. Some risk present — stay informed.');
      } else {
        showResult('safe', '✅ You are NOT inside any mapped flood risk zone.');
      }
    },
    (err) => {
      btn.disabled = false;
      btn.textContent = '📍 Find Out My Flood Risk';
      let msg = 'Could not get your location. ';
      if (err.code === 1) msg += 'Please allow location/GPS permission for this site in your browser settings.';
      else if (err.code === 2) msg += 'Location signal unavailable — try moving outdoors or check your GPS/data connection.';
      else msg += 'Please try again.';
      showResult('info', msg);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function showResult(type, text) {
  const result = document.getElementById('result');
  result.className = type;
  result.style.display = 'block';
  result.textContent = text;
}
